name: "DevOps Deploy Pipeline"

on:
  workflow_dispatch: 
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: namegen
  EKS_CLUSTER_NAME: namegen-cluster

jobs:
  infrastructure_and_app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Apply (Infrastructure Check/Build)
        run: |
          cd terraform
          terraform apply -auto-approve

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image to Amazon ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Inject Database Secrets
        env:
          MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y gettext
          envsubst < k8s/mongodb-secret.yaml > k8s/mongodb-secret-final.yaml
          mv k8s/mongodb-secret-final.yaml k8s/mongodb-secret.yaml

      - name: Deploy to EKS (Kubernetes Check/Build)
        run: |
          sed -i "s|://amazonaws.com|${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}|g" k8s/app-deployment.yaml         
          kubectl apply -f k8s/
          
      - name: Fetch and Print Application URL from EKS
        shell: bash
        run: |
          echo "=================================================="
          echo "⏳ ממתין ש-AWS יקצה Load Balancer עבור האפליקציה..."
          
          EXTERNAL_DNS=""
          for i in {1..30}; do
            EXTERNAL_DNS=$(kubectl get svc namegen-service -o jsonpath='{.status.loadBalancer.ingress.hostname}' 2>/dev/null)
            if [ ! -z "$EXTERNAL_DNS" ] && [ "$EXTERNAL_DNS" != "null" ]; then
              break
            fi
            echo "עדיין ממתין ל-DNS מהענן (ניסיון $i/30)..."
            sleep 10
          done

          echo "=================================================="
          if [ -z "$EXTERNAL_DNS" ] || [ "$EXTERNAL_DNS" = "null" ]; then
            echo "⚠️ חלף הזמן והענן עדיין לא הקצה DNS ציבורי."
          else
            echo "🚀 האפליקציה עלתה בהצלחה לענן AWS!"
            echo "🔗 הקישור המעודכן לאפליקציה שלך:"
            echo "http://$EXTERNAL_DNS"
          fi
          echo "=================================================="
          echo "=================================================="
