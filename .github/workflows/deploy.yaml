name: "DevOps Deploy Pipeline"

on:
  workflow_dispatch: 
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: namegen
  EKS_CLUSTER_NAME: namegen-cluster

jobs:
  infrastructure_and_app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Apply (Infrastructure Check/Build)
        run: |
          cd terraform
          terraform apply -auto-approve
          
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image to Amazon ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Inject Database Secrets
        env:
          MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y gettext
          envsubst < k8s/mongodb-secret.yaml > k8s/mongodb-secret-final.yaml
          mv k8s/mongodb-secret-final.yaml k8s/mongodb-secret.yaml

      - name: Prepare Deployment Image Tag
        run: |
          sed -i "s|image: .*namegen:.*|image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}|g" k8s/app-deployment.yaml

      - name: Deploy to EKS (Kubernetes Check/Build)
        run: |
          # הפעלת כל הקבצים לפי הסדר הנכון
          kubectl apply -f k8s/mongodb-secret.yaml
          kubectl apply -f k8s/mongodb-pvc.yaml
          kubectl apply -f k8s/mongodb-service.yaml
          kubectl apply -f k8s/mongodb-statefulset.yaml
          kubectl apply -f k8s/app-deployment.yaml
          kubectl apply -f k8s/app-service.yaml
          
      - name: Fetch and Print Application URL from EKS (NLB)
        shell: bash
        run: |
          echo "=================================================="
          echo "🔎 ממתין להקצאת כתובת ה-Load Balancer ב-AWS (זה לוקח כ-2-3 דקות)..."
          echo "=================================================="
          

          kubectl rollout status deployment/namegen --timeout=5m
          

          NLB_DNS=""
          for i in {1..30}; do
            NLB_DNS=$(kubectl get svc namegen-service -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            if [ ! -z "$NLB_DNS" ] && [ "$NLB_DNS" != "null" ]; then
              break
            fi
            sleep 10
          done
          
          echo "=================================================="
          if [ -z "$NLB_DNS" ] || [ "$NLB_DNS" = "null" ]; then
            echo "⏳ ה-Load Balancer עדיין בתהליך הקמה ב-AWS."
            echo "תוכל למצוא את הכתובת בעוד מספר דקות ב-AWS Console תחת EC2 -> Load Balancers."
          else
            echo "🚀 ה-Network Load Balancer (NLB) נוצר בהצלחה!"
            echo "🔗 הקישור הציבורי לפרויקט הגמר שלך:"
            echo "http://$NLB_DNS"
          fi
          echo "=================================================="
