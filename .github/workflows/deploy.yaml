name: "DevOps Deploy Pipeline EC2"

on:
  workflow_dispatch: 
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: namegen

jobs:
  deploy_to_ec2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        id: terraform
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
          # שמירת ה-IP הציבורי כמשתנה לצעדים הבאים
          SERVER_IP=$(terraform output -raw server_public_ip)
          echo "SERVER_IP=$SERVER_IP" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Containers on EC2 via SSM/AWS CLI
        run: |
          echo "ממתין 30 שניות שרכיב ה-Docker בשרת יסיים להתקין..."
          sleep 30
          
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids $(cd terraform && terraform output -raw server_public_ip) \
            --parameters commands=["
              sudo docker login -u AWS -p ${{ steps.login-ecr.outputs.registry }} ${{ steps.login-ecr.outputs.registry }}
              sudo docker stop namegen-app mongodb || true
              sudo docker rm namegen-app mongodb || true
              sudo docker run -d --name mongodb -p 27017:27017 -e MONGO_INITDB_ROOT_PASSWORD=${{ secrets.MONGODB_PASSWORD }} mongo:latest
              sudo docker run -d --name namegen-app -p 8080:8080 -e MONGODB_URL='mongodb://genuser:${{ secrets.MONGODB_PASSWORD }}@localhost:27017/namegen?authSource=admin' ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            "] \
            --region ${{ env.AWS_REGION }}

      - name: Print Application URL
        run: |
          echo "=================================================="
          echo "🚀 ה-Deployment עבר בהצלחה בשיטת EC2!"
          echo "🔗 קישור ישיר לאפליקציה שלך:"
          echo "http://${{ env.SERVER_IP }}:8080"
          echo "=================================================="
