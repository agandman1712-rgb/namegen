name: Build and Deploy to EKS

on:
  push:
    branches:
      - main 
  
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: namegen-v1
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

    - name: Set up Kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'v1.31.0'

    - name: Update Kubeconfig for EKS
      run: |
        aws eks update-kubeconfig --region us-east-1 --name namegen-cluster-v1

    - name: Update Kubernetes Manifest
      run: |
        sed -i "s|PLACEHOLDER_IMAGE|${{ env.image }}|g" k8s/app-deployment.yaml
        sed -i "s|PLACEHOLDER_DB_URL|${{ secrets.MONGODB_URL }}|g" k8s/app-deployment.yaml

    - name: Deploy MongoDB (DB Topology)
      run: |
        kubectl apply -f k8s/mongodb-service.yaml
        kubectl apply -f k8s/mongodb-statefulset.yaml
        kubectl rollout status statefulset/mongodb --timeout=120s

    - name: Deploy Application
      run: |
        kubectl apply -f k8s/app-deployment.yaml
        kubectl apply -f k8s/app-service.yaml

    - name: Verify Deployment
      run: |
        kubectl rollout status deployment/namegen --timeout=180s
