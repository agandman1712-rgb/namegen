name: "Auto Destroy Costly Infrastructure at Midnight"

on:
  schedule:
    # 00:00 UTC
    - cron: '0 0 * * *'

permissions:
  id-token: write
  contents: read

jobs:
  auto_cost_cut:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-eks-deploy-role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Automatic Midnight Cost Cut (Destroy Expensive Only)
        run: |
          cd terraform
          terraform destroy -target=aws_eks_cluster.eks_cluster -target=module.vpc.aws_nat_gateway.this -auto-approve
