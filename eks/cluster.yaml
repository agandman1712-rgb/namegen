apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: namegen-cluster-v2
  region: us-east-1
  version: "1.30"

managedNodeGroups:
  - name: default-node-group
    instanceType: t3.small   
    desiredCapacity: 1       
    minSize: 1
    maxSize: 1
    volumeSize: 20           
    privateNetworking: false 
