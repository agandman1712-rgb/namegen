version: '3.8'

services:
  mongodb:
    image: mongo:3.6
    container_name: mongodb_container
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  web-app:
    build: .
    container_name: node_app_container
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/namegen
    restart: always 
    depends_on:
      - mongodb
volumes:
  mongo_data: