apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo 
spec:
  serviceName: "mongo" 
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:3.6 
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongodb-storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: "ebs-auto-compute" 
        resources:
          requests:
            storage: 2Gi 