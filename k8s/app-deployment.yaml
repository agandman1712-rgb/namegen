apiVersion: apps/v1
kind: Deployment
metadata:
  name: namegen
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: namegen
  template:
    metadata:
      labels:
        app: namegen
    spec:
      containers:
        - name: namegen
          image: PLACEHOLDER_IMAGE
          ports:
            - containerPort: 8080
          env:
            - name: MONGODB_URL
              value: "mongodb://genuser:$(MONGO_ROOT_PASSWORD)@mongodb:27017/namegen?authSource=admin"
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: mongo-root-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
